services:
  - type: web
    name: cropwise-ai-api
    env: python
    plan: free
    rootDir: Flask_API
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_HTTP_REFERER
        sync: false
